aid: aliro-quantum
name: Aliro Quantum
description: >-
  Aliro Quantum (branded "Aliro, The Quantum Networking Company") is a
  Boston-based, Harvard spin-out building full-stack software for
  entanglement-based quantum networks. Its platform unifies three core
  products: the Aliro Simulator for physically accurate, optical-level
  modeling and validation of heterogeneous quantum networks before any
  hardware is deployed; AlirOS, a vendor-agnostic control-plane operating
  system that runs on quantum end-nodes and quantum repeaters across
  multiple hardware modalities; and the Aliro Orchestrator, a centralized
  single-pane-of-glass management system that configures, monitors, and
  operates quantum nodes and services through the full network lifecycle.
  These are packaged commercially as AliroNet — described by Aliro as the
  world's first end-to-end entanglement-based quantum network solution —
  delivered in three modes (Emulate, Pilot, and Deployment) and also
  available as AliroNet Quickstart, a bundled hardware-plus-software
  starter package that pairs third-party photon sources, detectors,
  memories, repeaters, and routers with Aliro's orchestration, control,
  and data operations software. The company markets Quantum-Powered
  Security as its anchor use case (Harvest-Now-Decrypt-Later mitigation
  for telcos, utilities, financial services, and defense), alongside
  quantum-computing interconnects (clustered and blind quantum compute
  for cloud providers), networked quantum sensors for
  positioning/navigation/timing, and quantum position verification.
  Customers and design partners disclosed publicly include EPB of
  Chattanooga, Boeing, Cisco, the US Air Force, Brookhaven National
  Laboratory, Stony Brook University, and Noblis. Aliro is backed by
  deep-tech investors including Cisco Investments and Accenture Ventures,
  reports more than 50 third-party quantum networking devices already
  integrated with its stack, and operates with hardware-agnostic
  positioning across photonic, trapped-ion, neutral-atom, and
  diamond-defect node technologies. There is no public developer API,
  SDK, CLI, or open-source repository — the AlirOS APIs referenced in
  Aliro's product materials are vendor-facing integration interfaces
  consumed under commercial engagement, and Aliro's GitHub organization
  carries no public repositories.
